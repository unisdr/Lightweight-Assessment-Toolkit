name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    name: Test & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build
